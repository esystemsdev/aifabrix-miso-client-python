name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (leave empty to use current version)'
        required: false
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # Required to create and push tag on manual run

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"

    - name: Cache pip dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-test.txt
        pip install build twine

    - name: Get version
      id: get_version
      run: |
        if [ -n "${{ inputs.version }}" ]; then
          VERSION="${{ inputs.version }}"
        else
          VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml', 'rb'))['project']['version'])")
        fi
        echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
        echo "Publishing version: $VERSION"

    - name: Check if version already published
      id: check_published
      run: |
        VERSION="${{ steps.get_version.outputs.VERSION }}"
        
        # Check if version exists on PyPI
        HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://pypi.org/pypi/miso-client/$VERSION/json")
        
        if [ "$HTTP_STATUS" = "200" ]; then
          echo "⚠️  Version $VERSION already published on PyPI. Skipping publish steps."
          echo "already_published=true" >> $GITHUB_OUTPUT
          exit 0
        fi
        echo "already_published=false" >> $GITHUB_OUTPUT
        echo "✅ Version $VERSION not yet published, proceeding..."

    - name: Run tests
      if: steps.check_published.outputs.already_published != 'true'
      run: |
        pytest tests/ -v --cov=miso_client --cov-report=xml --cov-report=term
    
    - name: Build package
      if: steps.check_published.outputs.already_published != 'true'
      run: |
        python -m build

    - name: Verify build output
      if: steps.check_published.outputs.already_published != 'true'
      run: |
        if [ ! -d "dist" ]; then
          echo "❌ Build failed: dist directory not found"
          exit 1
        fi
        ls -la dist/
        echo "✅ Build output verified"
    
    - name: Check package
      if: steps.check_published.outputs.already_published != 'true'
      run: |
        twine check dist/*
    
    - name: Publish to PyPI
      if: steps.check_published.outputs.already_published != 'true'
      env:
        TWINE_USERNAME: __token__
        TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
      run: |
        twine upload dist/*

    - name: Verify publication
      if: steps.check_published.outputs.already_published != 'true'
      run: |
        VERSION="${{ steps.get_version.outputs.VERSION }}"
        
        echo "Waiting for PyPI to update..."
        sleep 30
        
        HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://pypi.org/pypi/miso-client/$VERSION/json")
        
        if [ "$HTTP_STATUS" = "200" ]; then
          echo "✅ Successfully verified: miso-client==$VERSION"
        else
          echo "⚠️  Could not verify (PyPI registry may take time to update)"
        fi

    - name: Summary
      run: |
        VERSION="${{ steps.get_version.outputs.VERSION }}"
        ALREADY_PUBLISHED="${{ steps.check_published.outputs.already_published }}"
        
        if [ "$ALREADY_PUBLISHED" = "true" ]; then
          echo "ℹ️ Version already exists on PyPI; publish steps were skipped."
        else
          echo "✅ Successfully published to PyPI!"
        fi
        echo "📦 Package: miso-client"
        echo "🔖 Version: $VERSION"
        echo "🌐 Registry: https://pypi.org"
        echo ""
        echo "Installation: pip install miso-client==$VERSION"

    - name: Create and push tag (manual run only)
      if: github.event_name == 'workflow_dispatch' && steps.check_published.outputs.already_published != 'true'
      env:
        VERSION: ${{ steps.get_version.outputs.VERSION }}
      run: |
        TAG="v${VERSION}"
        if [[ "$VERSION" == v* ]]; then TAG="$VERSION"; fi
        if git ls-remote --tags origin "refs/tags/$TAG" | grep -q "$TAG"; then
          echo "Tag $TAG already exists on remote. Skipping tag creation."
          exit 0
        fi
        git tag -a "$TAG" -m "Release $TAG"
        git push origin "$TAG"
        echo "Tagged and pushed $TAG"

    - name: Update GitHub Release
      if: github.event_name == 'release'
      run: |
        VERSION="${{ steps.get_version.outputs.VERSION }}"
        
        gh release edit "v$VERSION" \
          --notes "## miso-client v$VERSION
        
        ✅ **Published to PyPI**: \`miso-client==$VERSION\`
        
        ### Installation
        \`\`\`bash
        pip install miso-client==$VERSION
        \`\`\`
        
        ### Package Information
        - **Registry**: https://pypi.org
        - **Package URL**: https://pypi.org/project/miso-client/$VERSION/"
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
